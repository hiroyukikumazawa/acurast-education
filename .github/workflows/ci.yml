name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  website-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json
      - name: Install
        working-directory: website
        run: npm ci
      - name: Build
        working-directory: website
        run: npm run build

