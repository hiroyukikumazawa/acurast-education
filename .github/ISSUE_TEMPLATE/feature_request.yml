name: Feature request
description: Suggest a new lesson/tutorial/video/diagram or site improvement.
title: "[Request]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - docs
        - tutorials
        - courses
        - videos
        - assets/diagrams
        - website
        - community
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What do you want to add or improve?
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Sources (official preferred)
      description: Link any official docs/blog/GitHub references relevant to the request.

